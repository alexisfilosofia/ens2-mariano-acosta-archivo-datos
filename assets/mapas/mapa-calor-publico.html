<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIINfQCVf5v5rSjslGxQr4GdOlU4r8pN340=" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <style>
    html, body, #map, .leaflet-container { width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden; }
    body { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f7f3ea; }
    .leaflet-popup-content, .leaflet-tooltip { color: #1f2933; font-size: 13px; }
  </style>
  <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
  <title>Mapa de calor público de domicilios estudiantiles</title>
</head>
<body>
  <div id="map" role="img" aria-label="Mapa de calor público de domicilios estudiantiles agregados"></div>
  <script>
    const cells = [[-34.62, -58.42, 55], [-34.62, -58.4, 41], [-34.62, -58.38, 22], [-34.6, -58.4, 22], [-34.6, -58.42, 18], [-34.64, -58.48, 14], [-34.64, -58.4, 11], [-34.64, -58.36, 10], [-34.62, -58.44, 10], [-34.58, -58.42, 10], [-34.62, -58.46, 9], [-34.64, -58.46, 7], [-34.64, -58.42, 7], [-34.6, -58.44, 7], [-34.62, -58.48, 6], [-34.6, -58.38, 6], [-34.56, -58.46, 6], [-34.66, -58.4, 3], [-34.64, -58.52, 3], [-34.64, -58.38, 3], [-34.58, -58.48, 3], [-34.58, -58.4, 3]];
    const metadata = {"source": "Public aggregated version generated from local heat-map coordinates", "grid_degrees": 0.02, "minimum_count_per_cell": 3, "published_cells": 22, "suppressed_records_in_small_cells": 20};
    const map = L.map('map', { scrollWheelZoom: false }).setView([-34.61696, -58.41804], 12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 18,
      attribution: '&copy; OpenStreetMap contributors'
    }).addTo(map);
    L.marker([-34.6083, -58.3712], { title: 'ENS N.º 2 Mariano Acosta' })
      .addTo(map)
      .bindPopup('ENS N.º 2 Mariano Acosta');
    const heatPoints = cells.map(([lat, lon, count]) => [lat, lon, Math.max(0.15, count / 55)]);
    L.heatLayer(heatPoints, {
      minOpacity: 0.35,
      radius: 34,
      blur: 26,
      maxZoom: 17,
      gradient: { 0.25: '#e8d89b', 0.55: '#b08a3c', 0.85: '#783344' }
    }).addTo(map);
    window.addEventListener('load', () => {
      setTimeout(() => map.invalidateSize(), 150);
    });
    window.addEventListener('resize', () => {
      setTimeout(() => map.invalidateSize(), 150);
    });
  </script>
</body>
</html>
